<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narratoons — Craft</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="Images/favicon_io/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous"/>
    <script src="js/craft.js" defer></script>
    <style>
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 6px;
        }
        .search_container { flex: 1; margin-bottom: 0; }

        /* Mic button */
        .mic-btn {
            flex: 0 0 46px;
            width: 46px; height: 46px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            padding: 0; margin: 0;
        }
        .mic-btn:hover { background: rgba(100,220,180,0.3); transform: scale(1.08); }

        /* Listening = pulsing red */
        .mic-btn.listening {
            background: rgba(255,70,70,0.9);
            animation: mic-pulse 1.1s infinite;
        }
        @keyframes mic-pulse {
            0%   { box-shadow: 0 0 0 0   rgba(255,70,70,0.7); }
            70%  { box-shadow: 0 0 0 14px rgba(255,70,70,0); }
            100% { box-shadow: 0 0 0 0   rgba(255,70,70,0); }
        }

        /* Status line */
        .voice-status {
            font-size: 0.78rem;
            color: aquamarine;
            min-height: 16px;
            margin-bottom: 10px;
            text-align: center;
            transition: opacity 0.3s;
        }
        .voice-status.hidden { opacity: 0; pointer-events: none; }

        /* Unsupported warning */
        .voice-unsupported {
            font-size: 0.75rem;
            color: #ff8a8a;
            margin-bottom: 8px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
      <div class="navbar">
        <div class="logo"><a href="index.html">Narratoons</a></div>
        <ul class="links">
          <li><a href="index.html#top">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </header>

    <div class="main-container">
        <div class="sections-container">

            <!-- LEFT PANEL -->
            <div class="left-panel">
                <div class="section">

                    <!-- Input row: text field + mic button side by side -->
                    <div class="input-row">
                        <div class="search_container">
                            <input
                                type="text"
                                id="prompt-input"
                                placeholder="Type or 🎙 speak your scene..."
                            />
                        </div>
                        <button
                            class="mic-btn"
                            id="mic-btn"
                            title="Click to speak your prompt"
                            onclick="toggleVoice()"
                        >
                            <i class="fa-solid fa-microphone" id="mic-icon"></i>
                        </button>
                    </div>

                    <!-- Voice feedback status -->
                    <div class="voice-status hidden" id="voice-status"></div>
                    <div class="voice-unsupported" id="voice-unsupported">
                        ⚠️ Voice input only works in Chrome / Edge. Please use those browsers.
                    </div>

                    <button id="generate-btn" class="option-item">Generate Comic</button>

                    <div class="options-section">
                        <!-- GRID DROPDOWN -->
                        <div class="grid-type-dropdown">
                            <div class="dropdown-selected" onclick="toggleDropdown()">
                                <div class="selected-content">
                                    <span id="selected-grid-icon">
                                        <svg width="24" height="24" viewBox="0 0 24 24">
                                            <rect x="2"  y="2"  width="9" height="9" fill="#444"/>
                                            <rect x="13" y="2"  width="9" height="9" fill="#444"/>
                                            <rect x="2"  y="13" width="9" height="9" fill="#444"/>
                                            <rect x="13" y="13" width="9" height="9" fill="#444"/>
                                        </svg>
                                    </span>
                                    <span id="selected-grid-label">TYPE-1</span>
                                </div>
                                <span class="dropdown-arrow">&#9662;</span>
                            </div>
                            <div class="dropdown-list" id="dropdown-list" style="display:none;">
                                <div class="dropdown-item selected" onclick="selectGrid(0)">
                                    <div class="item-content">
                                        <span class="grid-icon"><svg width="24" height="24" viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9" fill="#444"/><rect x="13" y="2" width="9" height="9" fill="#444"/><rect x="2" y="13" width="9" height="9" fill="#444"/><rect x="13" y="13" width="9" height="9" fill="#444"/></svg></span>
                                        <span>TYPE-1 (2×2 Grid)</span>
                                    </div>
                                    <span class="checkmark">&#10003;</span>
                                </div>
                                <div class="dropdown-item" onclick="selectGrid(1)">
                                    <div class="item-content">
                                        <span class="grid-icon"><svg width="24" height="24" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="9" fill="#444"/><rect x="2" y="13" width="9" height="9" fill="#888"/><rect x="13" y="13" width="9" height="9" fill="#444"/></svg></span>
                                        <span>TYPE-2 (Wide Top)</span>
                                    </div>
                                </div>
                                <div class="dropdown-item" onclick="selectGrid(2)">
                                    <div class="item-content">
                                        <span class="grid-icon"><svg width="24" height="24" viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="20" fill="#444"/><rect x="13" y="2" width="9" height="9" fill="#888"/><rect x="13" y="13" width="9" height="9" fill="#888"/></svg></span>
                                        <span>TYPE-3 (Tall Left)</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- STYLE DROPDOWN -->
                        <div class="picture-style-dropdown">
                            <div class="dropdown-selected" onclick="togglePictureDropdown()">
                                <span id="selected-picture-label">Japanese</span>
                                <span class="dropdown-arrow">&#9662;</span>
                            </div>
                            <div class="dropdown-list" id="picture-dropdown-list" style="display:none;">
                                <div class="dropdown-item selected" onclick="selectPictureType(0)">Japanese <span class="checkmark">&#10003;</span></div>
                                <div class="dropdown-item" onclick="selectPictureType(1)">American</div>
                                <div class="dropdown-item" onclick="selectPictureType(2)">Egyptian</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <div class="section output-section">
                    <h2 class="output-title">Generated Comic Panel</h2>
                    <div id="output-picture-style" class="output-picture-style">Style: Japanese</div>
                    <div id="output-images" class="output-images grid-0"></div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
